<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#F4E4BA"/>
      <stop offset="100%" style="stop-color:#C9A227"/>
    </linearGradient>
  </defs>
  
  <!-- Stylized A with building silhouette -->
  <g transform="translate(4, 4)">
    <!-- Building silhouette forming an A shape -->
    <polygon points="12,0 24,24 18,24 18,16 14,10 10,16 6,16 6,24 0,24" fill="url(#goldGradient)"/>
    
    <!-- Window accents -->
    <rect x="10" y="18" width="2" height="2" fill="#1a1a1a"/>
    <rect x="12" y="18" width="2" height="2" fill="#1a1a1a"/>
    <rect x="10" y="22" width="2" height="2" fill="#1a1a1a"/>
    <rect x="12" y="22" width="2" height="2" fill="#1a1a1a"/>
  </g>
</svg>