<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <!-- Gold Gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#F4E4BA"/>
      <stop offset="100%" style="stop-color:#C9A227"/>
    </linearGradient>
    
    <!-- Secondary Gold -->
    <linearGradient id="goldGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D48A"/>
      <stop offset="100%" style="stop-color:#B8960C"/>
    </linearGradient>
  </defs>
  
  <!-- Dark Background -->
  <rect width="400" height="120" fill="#1a1a1a"/>
  
  <!-- Building/Skyline Icon -->
  <g transform="translate(20, 20)">
    <!-- Main Building -->
    <rect x="5" y="25" width="18" height="45" fill="url(#goldGradient)" rx="1"/>
    
    <!-- Windows on main building -->
    <rect x="9" y="30" width="4" height="5" fill="#1a1a1a" opacity="0.9"/>
    <rect x="15" y="30" width="4" height="5" fill="#1a1a1a" opacity="0.9"/>
    <rect x="9" y="40" width="4" height="5" fill="#1a1a1a" opacity="0.9"/>
    <rect x="15" y="40" width="4" height="5" fill="#1a1a1a" opacity="0.9"/>
    <rect x="9" y="50" width="4" height="5" fill="#1a1a1a" opacity="0.9"/>
    <rect x="15" y="50" width="4" height="5" fill="#1a1a1a" opacity="0.9"/>
    
    <!-- Tall Building -->
    <rect x="25" y="10" width="14" height="60" fill="url(#goldGradient)" rx="1"/>
    
    <!-- Windows on tall building -->
    <rect x="28" y="15" width="3" height="4" fill="#1a1a1a" opacity="0.9"/>
    <rect x="33" y="15" width="3" height="4" fill="#1a1a1a" opacity="0.9"/>
    <rect x="28" y="23" width="3" height="4" fill="#1a1a1a" opacity="0.9"/>
    <rect x="33" y="23" width="3" height="4" fill="#1a1a1a" opacity="0.9"/>
    <rect x="28" y="31" width="3" height="4" fill="#1a1a1a" opacity="0.9"/>
    <rect x="33" y="31" width="3" height="4" fill="#1a1a1a" opacity="0.9"/>
    <rect x="28" y="39" width="3" height="4" fill="#1a1a1a" opacity="0.9"/>
    <rect x="33" y="39" width="3" height="4" fill="#1a1a1a" opacity="0.9"/>
    <rect x="28" y="47" width="3" height="4" fill="#1a1a1a" opacity="0.9"/>
    <rect x="33" y="47" width="3" height="4" fill="#1a1a1a" opacity="0.9"/>
    <rect x="28" y="55" width="3" height="4" fill="#1a1a1a" opacity="0.9"/>
    <rect x="33" y="55" width="3" height="4" fill="#1a1a1a" opacity="0.9"/>
    
    <!-- Small Building -->
    <rect x="41" y="40" width="12" height="30" fill="url(#goldGradient)" rx="1"/>
    
    <!-- Windows on small building -->
    <rect x="44" y="45" width="3" height="4" fill="#1a1a1a" opacity="0.9"/>
    <rect x="48" y="45" width="3" height="4" fill="#1a1a1a" opacity="0.9"/>
    <rect x="44" y="53" width="3" height="4" fill="#1a1a1a" opacity="0.9"/>
    <rect x="48" y="53" width="3" height="4" fill="#1a1a1a" opacity="0.9"/>
    
    <!-- Roof accent on tall building -->
    <polygon points="32,10 25,10 32,5 39,10" fill="url(#goldGradient2)"/>
    
    <!-- Ground line -->
    <line x1="0" y1="70" x2="58" y2="70" stroke="url(#goldGradient)" stroke-width="2"/>
  </g>
  
  <!-- Brand Name: Atibha -->
  <text x="90" y="55" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="400" fill="url(#goldGradient)" letter-spacing="4">ATIBHA</text>
  
  <!-- Brand Name: Realty -->
  <text x="90" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="300" fill="url(#goldGradient)" letter-spacing="8">REALTY</text>
  
  <!-- Decorative line -->
  <line x1="90" y1="88" x2="200" y2="88" stroke="url(#goldGradient)" stroke-width="1"/>
  
  <!-- Est. 2003 -->
  <text x="90" y="102" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#B8960C" letter-spacing="3">EST. 2003</text>
  
  <!-- Decorative diamond -->
  <polygon points="205,98 208,95 211,98 208,101" fill="url(#goldGradient)"/>
</svg>