<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Gold Gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#F4E4BA"/>
      <stop offset="100%" style="stop-color:#C9A227"/>
    </linearGradient>
  </defs>
  
  <!-- Transparent background -->
  
  <!-- Stylized Building Icon -->
  <g transform="translate(8, 8)">
    <!-- Main Building (left) -->
    <rect x="2" y="20" width="14" height="28" fill="url(#goldGradient)" rx="1"/>
    
    <!-- Windows -->
    <rect x="5" y="24" width="3" height="4" fill="#ffffff" opacity="0.9"/>
    <rect x="10" y="24" width="3" height="4" fill="#ffffff" opacity="0.9"/>
    <rect x="5" y="32" width="3" height="4" fill="#ffffff" opacity="0.9"/>
    <rect x="10" y="32" width="3" height="4" fill="#ffffff" opacity="0.9"/>
    <rect x="5" y="40" width="3" height="4" fill="#ffffff" opacity="0.9"/>
    <rect x="10" y="40" width="3" height="4" fill="#ffffff" opacity="0.9"/>
    
    <!-- Tall Building (center) -->
    <rect x="18" y="8" width="12" height="40" fill="url(#goldGradient)" rx="1"/>
    
    <!-- Windows on tall building -->
    <rect x="21" y="12" width="2.5" height="3" fill="#ffffff" opacity="0.9"/>
    <rect x="25" y="12" width="2.5" height="3" fill="#ffffff" opacity="0.9"/>
    <rect x="21" y="18" width="2.5" height="3" fill="#ffffff" opacity="0.9"/>
    <rect x="25" y="18" width="2.5" height="3" fill="#ffffff" opacity="0.9"/>
    <rect x="21" y="24" width="2.5" height="3" fill="#ffffff" opacity="0.9"/>
    <rect x="25" y="24" width="2.5" height="3" fill="#ffffff" opacity="0.9"/>
    <rect x="21" y="30" width="2.5" height="3" fill="#ffffff" opacity="0.9"/>
    <rect x="25" y="30" width="2.5" height="3" fill="#ffffff" opacity="0.9"/>
    <rect x="21" y="36" width="2.5" height="3" fill="#ffffff" opacity="0.9"/>
    <rect x="25" y="36" width="2.5" height="3" fill="#ffffff" opacity="0.9"/>
    
    <!-- Small Building (right) -->
    <rect x="32" y="28" width="10" height="20" fill="url(#goldGradient)" rx="1"/>
    
    <!-- Windows on small building -->
    <rect x="34" y="32" width="2.5" height="3" fill="#ffffff" opacity="0.9"/>
    <rect x="38" y="32" width="2.5" height="3" fill="#ffffff" opacity="0.9"/>
    <rect x="34" y="38" width="2.5" height="3" fill="#ffffff" opacity="0.9"/>
    <rect x="38" y="38" width="2.5" height="3" fill="#ffffff" opacity="0.9"/>
    
    <!-- Roof spire on tall building -->
    <polygon points="24,8 18,8 24,3 30,8" fill="url(#goldGradient)"/>
    
    <!-- Ground line -->
    <line x1="0" y1="48" x2="44" y2="48" stroke="url(#goldGradient)" stroke-width="2"/>
  </g>
</svg>